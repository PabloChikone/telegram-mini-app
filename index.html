<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Dashboard MAX</title>
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Chart.js для графиков -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #f5f5f7);
            color: var(--tg-theme-text-color, #000);
            margin: 0;
            padding: 20px;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 { margin-top: 0; font-size: 18px; color: var(--tg-theme-hint-color, #666); }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--tg-theme-button-color, #3390ec); }
        
        /* Таблица */
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: var(--tg-theme-hint-color, #888); font-weight: normal; }
        
        /* Лоадер */
        #loader { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Статус системы</h2>
        <div id="status-text" class="stat-value">Загрузка...</div>
    </div>

    <div class="card">
        <h2>Динамика успешных ТМК (MAX)</h2>
        <canvas id="tmkChart"></canvas>
    </div>

    <div class="card">
        <h2>Детальные данные</h2>
        <div style="overflow-x: auto;">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Кол-во</th>
                        <th>Время</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Данные загрузятся сюда -->
                </tbody>
            </table>
        </div>
    </div>

    <div id="loader">Подключение к серверу...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ВАЖНО: Сюда нужно будет вставить ссылку от ngrok после запуска
        // Пока оставим заглушку, ты заменишь её в шаге 3
        const API_URL = "https://diametrally-uncustomary-angelic.ngrok-free.dev/api/data"; 

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Ошибка сети");
                const result = await response.json();
                
                if (result.status === "ok") {
                    renderDashboard(result.data);
                } else {
                    document.getElementById('status-text').innerText = "Ошибка данных";
                }
            } catch (error) {
                console.error(error);
                document.getElementById('status-text').innerText = "Нет связи с сервером";
                document.getElementById('loader').innerText = "Проверь, запущен ли Python и ngrok";
            }
        }

        function renderDashboard(data) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status-text').innerText = "Данные актуальны";

            // 1. Заполняем таблицу
            const tbody = document.querySelector("#dataTable tbody");
            let labels = [];
            let values = [];
            let times = [];

            data.forEach(row => {
                // Таблица
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${row.date}</td>
                    <td><b>${row.successful_tmk_count}</b></td>
                    <td>${row.last_modified_time}</td>
                `;
                tbody.appendChild(tr);

                // Данные для графика
                labels.push(row.date.slice(5)); // Берем только ММ.ДД
                values.push(row.successful_tmk_count);
                times.push(row.last_modified_time);
            });

            // 2. Рисуем график
            const ctx = document.getElementById('tmkChart').getContext('2d');
            
            // Адаптируем цвета под тему Telegram
            const chartColor = getComputedStyle(document.body).getPropertyValue('--tg-theme-button-color').trim() || '#3390ec';
            const textColor = getComputedStyle(document.body).getPropertyValue('--tg-theme-text-color').trim() || '#000';

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Успешные ТМК',
                        data: values,
                        backgroundColor: chartColor,
                        borderRadius: 6,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: textColor }
                        },
                        x: {
                            ticks: { color: textColor }
                        }
                    }
                }
            });
        }

        fetchData();
        tg.ready();
    </script>
</body>
</html>
