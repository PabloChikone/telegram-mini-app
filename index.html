<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMK Дашборд</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #222);
            padding: 16px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .header { 
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            text-align: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, white);
            padding: 12px 8px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .stat-card.active {
            opacity: 1;
            box-shadow: 0 0 0 2px var(--tg-theme-text-color, black);
        }
        .stat-card.inactive {
            opacity: 0.5;
        }
        .stat-label { font-size: 12px; margin-bottom: 4px; }
        .stat-value { font-size: 18px; }
        .stat-small { font-size: 11px; opacity: 0.9; margin-top: 4px; }
        
        .chart-container {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        
        .details-table {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            padding: 16px;
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        th { font-weight: 600; }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 16px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📊 TMK Статистика</h2>
            <div id="lastUpdate">Загрузка...</div>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        <div id="loading" class="loading">Загрузка данных...</div>
        
        <div id="content" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card" data-period="today" onclick="setPeriod('today')">
                    <div class="stat-label">Сегодня</div>
                    <div class="stat-value" id="today-value">-</div>
                    <div class="stat-small" id="today-avg">ср. -</div>
                </div>
                <div class="stat-card" data-period="week" onclick="setPeriod('week')">
                    <div class="stat-label">Неделя</div>
                    <div class="stat-value" id="week-value">-</div>
                    <div class="stat-small" id="week-avg">ср. -</div>
                </div>
                <div class="stat-card" data-period="month" onclick="setPeriod('month')">
                    <div class="stat-label">Месяц</div>
                    <div class="stat-value" id="month-value">-</div>
                    <div class="stat-small" id="month-avg">ср. -</div>
                </div>
                <div class="stat-card" data-period="quarter" onclick="setPeriod('quarter')">
                    <div class="stat-label">Квартал</div>
                    <div class="stat-value" id="quarter-value">-</div>
                    <div class="stat-small" id="quarter-avg">ср. -</div>
                </div>
                <div class="stat-card" data-period="year" onclick="setPeriod('year')">
                    <div class="stat-label">Год</div>
                    <div class="stat-value" id="year-value">-</div>
                    <div class="stat-small" id="year-avg">ср. -</div>
                </div>
                <div class="stat-card" data-period="all" onclick="setPeriod('all')">
                    <div class="stat-label">Всего</div>
                    <div class="stat-value" id="all-value">-</div>
                    <div class="stat-small" id="all-days">дней -</div>
                </div>
            </div>
            
            <div class="chart-container">
                <canvas id="tmkChart"></canvas>
            </div>
            
            <div class="details-table">
                <h3>Детальные данные</h3>
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Кол-во</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        let chart = null;
        let fullData = null;
        let currentPeriod = 'month';
        
        async function loadData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            
            try {
                // Пробуем localhost и реальный IP
                const endpoints = [
                    'http://localhost:8000/api/data',
                    `http://${window.location.hostname}:8000/api/data`,
                    'http://192.168.3.100:8000/api/data'  // замените на ваш IP
                ];
                
                let response = null;
                for (let endpoint of endpoints) {
                    try {
                        response = await fetch(endpoint);
                        if (response.ok) break;
                    } catch(e) { continue; }
                }
                
                if (!response || !response.ok) {
                    throw new Error('Не удалось подключиться к серверу');
                }
                
                const result = await response.json();
                if (result.status === 'ok' && result.data) {
                    fullData = result.data;
                    updateUI();
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                } else {
                    throw new Error('Некорректные данные');
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML = `
                    <strong>❌ Нет связи с сервером</strong><br>
                    Проверьте, запущен ли Python скрипт<br>
                    <small>${error.message}</small>
                `;
            }
        }
        
        function updateUI() {
            if (!fullData) return;
            
            // Обновляем дату
            document.getElementById('lastUpdate').innerHTML = 
                `Обновлено: ${fullData.last_updated}`;
            
            // Обновляем карточки
            for (let [period, data] of Object.entries(fullData.periods)) {
                const valueEl = document.getElementById(`${period}-value`);
                if (valueEl) {
                    valueEl.textContent = data.total.toLocaleString();
                }
                
                if (period === 'all') {
                    const daysEl = document.getElementById('all-days');
                    if (daysEl) daysEl.textContent = `дней: ${data.days}`;
                } else {
                    const avgEl = document.getElementById(`${period}-avg`);
                    if (avgEl) avgEl.textContent = `ср. ${data.avg}`;
                }
            }
            
            // Обновляем таблицу
            updateTable(fullData.chart_data);
            
            // Обновляем график
            updateChart(fullData.chart_data);
            
            // Подсвечиваем активный период
            document.querySelectorAll('.stat-card').forEach(card => {
                card.classList.remove('active');
                if (card.dataset.period === currentPeriod) {
                    card.classList.add('active');
                }
            });
        }
        
        function updateTable(chartData) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            // Показываем последние 20 записей
            chartData.slice(-20).reverse().forEach(item => {
                const row = tbody.insertRow();
                row.insertCell().textContent = item.date;
                row.insertCell().textContent = item.value.toLocaleString();
            });
        }
        
        function updateChart(chartData) {
            const ctx = document.getElementById('tmkChart').getContext('2d');
            
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.map(d => d.date),
                    datasets: [{
                        label: 'Успешные ТМК',
                        data: chartData.map(d => d.value),
                        borderColor: '#3390ec',
                        backgroundColor: 'rgba(51, 144, 236, 0.1)',
                        tension: 0.1,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }
        
        function setPeriod(period) {
            currentPeriod = period;
            
            // Подсвечиваем кнопку
            document.querySelectorAll('.stat-card').forEach(card => {
                card.classList.remove('active');
                if (card.dataset.period === period) {
                    card.classList.add('active');
                }
            });
            
            // Можно добавить логику фильтрации графика по периоду
            // Пока просто показываем все данные
        }
        
        // Загружаем данные при старте
        loadData();
        
        // Обновляем каждые 5 минут
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
