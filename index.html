<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мое Мини-приложение</title>
    <!-- Подключаем скрипт Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        button {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.8;
        }
        #message-area {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <button id="work-btn">Я работаю?</button>
    <div id="message-area"></div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрыть на весь экран

        const btn = document.getElementById('work-btn');
        const msgArea = document.getElementById('message-area');

        btn.addEventListener('click', () => {
            // Здесь в будущем будет запрос к твоему Python backend (PostgreSQL)
            // Сейчас эмулируем ответ
            
            // Эмуляция задержки сети (опционально)
            btn.disabled = true;
            btn.innerText = "Проверка...";

            setTimeout(() => {
                msgArea.innerText = "Привет, я работаю";
                btn.disabled = false;
                btn.innerText = "Я работаю?";
                
                // Вибрация для тактильного отклика (фишка Telegram)
                tg.HapticFeedback.impactOccurred('light');
            }, 300);
        });

        // Сообщаем Телеграму, что приложение готово
        tg.ready();
    </script>
</body>
</html>
